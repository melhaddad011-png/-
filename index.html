<!DOCTYPE html>
<html>
<head>
    <title>أول موقع</title>
    <style>
body{
    background-color: black;
    color: white;
    text-align: center;
}
h1{
    color: red;
    font-size: 40px;
}
button{
    background-color: blue;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 18px;
}
button:hover{
    background-color: green;
}
.card{
    background-color: gray;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}
</style>
</head>
<body>
<body>

    <h1>مرحبا موسى 👋</h1>
    <p>هذا أول موقع ديالي.</p>
    
    <br><br>

    <a href="https://www.google.com">اذهب إلى جوجل</a>

    <h2>الفرق التي أحبها</h2>
    <ul>
        <li>برشلونة</li>
        <li>منتخب المغرب</li>
        <li>مانشستر سيتي</li>
    </ul>

    <!-- دابا الزر غادي يخدم فاش تكليكي عليه -->
    <button onclick="hello()">اضغط هنا</button>

    <script>
        function hello() {
            // هكا الأقواس خاصها تكون مكتوبة باش ما تديرش خطأ
            alert("مرحبا موسى 👋");
        }
    </script>

    <!-- هاهي الـ card مجموعة ومقادة بلا تكرار -->
    <div class="card">
        <h2>نبذة عني</h2>
        <p>أنا موسى وأتعلم تصميم المواقع.</p>
    </div>

</body>

</body>
</html>
